name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install -g vercel@latest

      - name: Pull Vercel settings
        if: env.VERCEL_TOKEN != ''
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build and deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        run: vercel deploy --prod --token=$VERCEL_TOKEN
        env:
          VITE_VERIFY_API_URL: ${{ vars.VERIFY_API_URL }}

      - name: Vercel deploy skipped
        if: env.VERCEL_TOKEN == ''
        run: echo "::warning::VERCEL_TOKEN not set — relying on Vercel Git integration to deploy."
