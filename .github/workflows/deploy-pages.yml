name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          GITHUB_PAGES: 'true'
          VITE_VERIFY_API_URL: ${{ vars.VERIFY_API_URL != '' && vars.VERIFY_API_URL || 'https://minigame.vercel.app/api/verify-holding' }}

      - name: Vercel static config for gh-pages branch
        run: cp scripts/vercel-static.json dist/vercel.json

      - uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
